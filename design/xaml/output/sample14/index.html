<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Orchestra — MIDI-driven Chibi Performers (sample14)</title>
<style>
  :root {
    --bg: #0a0a14;
    --panel: rgba(12, 12, 22, 0.85);
    --panel-border: #1f2937;
    --text: #e5e7eb;
    --text-dim: #9ca3af;
    --accent: #fbbf24;
    --accent-dim: #b45309;
    --success: #34d399;
    --danger: #f87171;
    --fg-mono: 'JetBrains Mono', 'Geist Mono', ui-monospace, Consolas, monospace;
    --fg-ui: 'Inter', system-ui, -apple-system, sans-serif;
    --char-size: 96px;
    --dance-size: 132px;
    --idle-fps: 6;
    --play-fps: 10;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--fg-ui);
    color: var(--text);
    background: var(--bg);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* ========== Header ========== */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--panel-border);
    padding: 12px 20px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    z-index: 10;
    flex-shrink: 0;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, var(--accent), #fde68a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header h1 small {
    font-family: var(--fg-mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 8px;
    font-weight: 400;
    -webkit-text-fill-color: var(--text-dim);
  }
  .stage-tabs { display: flex; gap: 6px; }
  .stage-tabs button {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--panel-border);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--fg-mono);
    font-size: 11px;
    transition: all 0.2s;
  }
  .stage-tabs button:hover { color: var(--text); border-color: var(--accent-dim); }
  .stage-tabs button.active {
    color: #0a0a14;
    background: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
  }
  .midi-select {
    background: rgba(0,0,0,0.4);
    color: var(--text);
    border: 1px solid var(--panel-border);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: var(--fg-mono);
    font-size: 12px;
    min-width: 280px;
    cursor: pointer;
  }
  .play-btn, .stop-btn {
    background: var(--accent);
    color: #0a0a14;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 700;
    font-family: var(--fg-mono);
    font-size: 12px;
    letter-spacing: 0.5px;
    transition: transform 0.1s;
  }
  .stop-btn { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .play-btn:hover, .stop-btn:hover { transform: translateY(-1px); }
  .play-btn:disabled, .stop-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .time-display {
    font-family: var(--fg-mono);
    color: var(--text-dim);
    font-size: 12px;
    min-width: 90px;
    text-align: right;
    margin-left: auto;
  }

  /* ========== Stage ========== */
  main.stage {
    flex: 1 1 auto;
    min-height: 280px;
    position: relative;
    background-size: cover;
    background-position: center 70%; /* anchor floor area so it stays visible at small heights */
    background-color: #000;
    overflow: hidden;
    image-rendering: pixelated;
    transition: background-image 0.4s ease;
  }
  .orchestra {
    position: absolute;
    inset: 0;
    image-rendering: pixelated;
  }
  .character {
    position: absolute;
    width: var(--char-size);
    height: var(--char-size);
    background-repeat: no-repeat;
    /* sheet is 202×52 of pixels at native 48px frame; scale proportionally to --char-size */
    background-size: calc(var(--char-size) * 202 / 48) calc(var(--char-size) * 52 / 48);
    background-position: calc(var(--char-size) * -2 / 48) calc(var(--char-size) * -2 / 48);
    image-rendering: pixelated;
    transform: translate(-50%, -100%);
    transition: opacity 0.5s, transform 0.5s;
    opacity: 0;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
    /* Always run play animation; paused by default — resumes from current frame when notes come. */
    animation: char-play-anim 1.0s steps(4) infinite;
    animation-play-state: paused;
  }
  .character.spawned { opacity: 1; }
  .character.playing { animation-play-state: running; }
  /* Animate the full background-position so y stays locked while x steps through frames. */
  @keyframes char-play-anim {
    from { background-position: calc(var(--char-size) * -2  / 48) calc(var(--char-size) * -2 / 48); }
    to   { background-position: calc(var(--char-size) * -202 / 48) calc(var(--char-size) * -2 / 48); }
  }

  /* ========== Dance troupe (back tier — autonomous) ========== */
  .dance-troupe {
    position: absolute;
    inset: 0;
    pointer-events: none;
    image-rendering: pixelated;
  }
  .dancer {
    position: absolute;
    width: var(--dance-size);
    height: var(--dance-size);
    background-repeat: no-repeat;
    /* dance sheet is 808x208 at native 192px frame — scale to --dance-size */
    background-size: calc(var(--dance-size) * 808 / 192) calc(var(--dance-size) * 208 / 192);
    background-position: calc(var(--dance-size) * -8 / 192) calc(var(--dance-size) * -8 / 192);
    image-rendering: pixelated;
    /* --pitch-lift = gentle bob (global pitch) · --jump = onset trigger for this dancer's band */
    transform: translate(-50%, -100%)
               translateY(calc(var(--pitch-lift, 0px) * -1 - var(--jump, 0px)));
    transition: opacity 0.6s, transform 0.08s linear, filter 0.12s linear;
    opacity: 0;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.7))
            brightness(calc(1 + var(--pitch-glow, 0) * 0.35))
            hue-rotate(calc(var(--pitch-hue, 0) * 1deg));
    /* cycle locked to song tempo via --dance-cycle (set per playback) */
    animation: dance-anim var(--dance-cycle, 1.6s) steps(4) infinite;
    animation-play-state: paused;
  }
  .dancer.spawned { opacity: 1; }
  .dancer.dancing { animation-play-state: running; }
  .dancer-band-label {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--fg-mono);
    font-size: 9px;
    color: var(--accent);
    background: rgba(0,0,0,0.78);
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 0.3px;
  }
  @keyframes dance-anim {
    from { background-position: calc(var(--dance-size) * -8  / 192) calc(var(--dance-size) * -8 / 192); }
    to   { background-position: calc(var(--dance-size) * -808 / 192) calc(var(--dance-size) * -8 / 192); }
  }
  .character .label {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--fg-mono);
    font-size: 10px;
    color: var(--text-dim);
    background: rgba(0,0,0,0.7);
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .character.playing .label { opacity: 1; color: var(--accent); }

  /* ========== Footer ========== */
  footer {
    background: var(--panel);
    border-top: 1px solid var(--panel-border);
    padding: 6px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 10;
    flex-wrap: nowrap;     /* never wrap — keeps stage size stable */
    flex-shrink: 0;
    font-size: 11px;
    font-family: var(--fg-mono);
    color: var(--text-dim);
    min-height: 32px;
  }
  .active-instruments {
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    flex: 1 1 auto;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
    padding-bottom: 2px;
  }
  .active-instruments::-webkit-scrollbar { height: 4px; }
  .active-instruments::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  .active-tag {
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .credits {
    flex-shrink: 0;
    white-space: nowrap;
    opacity: 0.7;
  }
  .active-tag.active {
    color: #0a0a14;
    background: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
    transform: translateY(-1px);
  }
  .credits {
    color: var(--text-dim);
    font-size: 10px;
    opacity: 0.7;
  }

  /* ========== Loading / Empty state ========== */
  .stage-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: rgba(255,255,255,0.5);
    font-family: var(--fg-mono);
    font-size: 14px;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .stage-hint .icon { font-size: 36px; opacity: 0.5; }
  .stage-hint.hidden { opacity: 0; }

  /* MIDI analysis panel */
  .analysis-panel {
    background: rgba(8, 8, 16, 0.92);
    border-bottom: 1px solid var(--panel-border);
    padding: 6px 20px;
    display: flex;
    gap: 18px;
    flex-wrap: nowrap;
    overflow-x: auto;
    align-items: center;
    z-index: 9;
    flex-shrink: 0;
    font-family: var(--fg-mono);
    font-size: 11px;
    color: var(--text-dim);
    min-height: 30px;
  }
  .analysis-panel.hidden { display: none; }
  .analysis-item {
    display: flex;
    gap: 6px;
    align-items: baseline;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .analysis-item .label {
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-size: 9px;
  }
  .analysis-item .value {
    color: var(--text);
    font-weight: 500;
  }
  .analysis-sep {
    width: 1px;
    height: 12px;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  /* Progress bar overlay on stage */
  .progress-bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 3px;
    background: rgba(0,0,0,0.5);
    z-index: 5;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #fde68a);
    width: 0;
    transition: width 0.1s linear;
  }
</style>
</head>
<body>

<header>
  <h1>Pixel Orchestra <small>sample14 · S→W pipeline · MIDI-driven chibi performers</small></h1>
  <div class="stage-tabs" id="stage-tabs">
    <button data-stage="concert-hall" class="active">🎭 Concert Hall</button>
    <button data-stage="garden-pavilion">🌿 Garden Pavilion</button>
    <button data-stage="moonlit-castle">🌙 Moonlit Castle</button>
  </div>
  <select class="midi-select" id="midi-select">
    <option value="midi/01-beethoven-symphony5-1st.mid">Beethoven · Symphony No.5 — 1st mvt</option>
    <option value="midi/02-mozart-symphony40-1st.mid">Mozart · Symphony No.40 — 1st mvt</option>
    <option value="midi/03-dvorak-newworld-largo.mid">Dvořák · Symphony No.9 "New World" — Largo</option>
    <option value="midi/04-vivaldi-autumn.mid">Vivaldi · Autumn (Four Seasons)</option>
    <option value="midi/05-grieg-morning-mood.mid">Grieg · Morning Mood (Peer Gynt)</option>
    <option value="midi/06-handel-water-music.mid">Handel · Water Music — Hornpipe</option>
    <option value="midi/07-bach-toccata-fugue.mid">Bach · Toccata and Fugue in D minor</option>
    <option value="midi/08-brahms-symphony3-3rd.mid">Brahms · Symphony No.3 — 3rd Theme</option>
    <option value="midi/09-tchaikovsky-sugarplum.mid">Tchaikovsky · Sugar Plum Fairy</option>
    <option value="midi/10-mahler-symphony5-4th.mid">Mahler · Symphony No.5 — 4th (Adagietto)</option>
    <option value="midi/11-mozart-eine-kleine.mid">Mozart · Eine Kleine Nachtmusik — 1st mvt</option>
    <option value="midi/12-vivaldi-estro-armonico.mid">Vivaldi · L'estro Armonico No.11 — 2nd mvt</option>
    <option value="midi/13-saint-saens-orchestra.mid">Saint-Saëns · Orchestra Extract</option>
  </select>
  <button class="play-btn" id="play-btn">▶ Play</button>
  <button class="stop-btn" id="stop-btn" disabled>⏹ Stop</button>
  <div class="time-display" id="time-display">0:00 / 0:00</div>
</header>

<div class="analysis-panel hidden" id="analysis-panel"></div>

<main class="stage" id="stage" style="background-image: url('stages/concert-hall.png')">
  <!-- back tier — dance troupe (autonomous, MIDI-independent) -->
  <div class="dance-troupe" id="dance-troupe"></div>
  <!-- front tier — orchestra (MIDI-synced) -->
  <div class="orchestra" id="orchestra"></div>
  <div class="stage-hint" id="stage-hint">
    <div class="icon">🎼</div>
    <div>Choose a piece and press ▶ Play</div>
    <div style="font-size:10px; opacity:0.6">Orchestra spawns to MIDI · dance troupe performs freely</div>
  </div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill"></div></div>
</main>

<footer>
  <div class="active-instruments" id="active-instruments"></div>
  <div class="credits">19 orchestra + 36 dance chibi · 13 PD MIDI · 2-tier stage · @tonejs/midi + Tone.js · Case S→W (harness v2.7.0)</div>
</footer>

<script type="module">
  import * as Tone from 'https://cdn.jsdelivr.net/npm/tone@14.7.77/+esm';
  import { Midi } from 'https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/+esm';

  // ============ GM Program → Character slug ============
  // (channel 9/10 → drum always)
  function programToSlug(program, trackName) {
    const name = (trackName || '').toLowerCase();
    // Track name patterns override
    if (/soprano/.test(name))   return 'vocal-1';
    if (/alto/.test(name))      return 'vocal-2';
    if (/tenor/.test(name))     return 'vocal-3';
    if (/bass\b/.test(name))    return 'vocal-4';
    if (/choir|voice/.test(name)) return 'vocal-1';
    if (/violin/.test(name))    return 'violin';
    if (/viola/.test(name))     return 'viola';
    if (/cello/.test(name))     return 'cello';
    if (/contrabass|double bass/.test(name)) return 'contrabass';
    if (/flute/.test(name))     return 'flute';
    if (/clarinet/.test(name))  return 'clarinet';
    if (/oboe/.test(name))      return 'oboe';
    if (/trumpet/.test(name))   return 'trumpet';
    if (/trombone/.test(name))  return 'trombone';
    if (/horn/.test(name))      return 'horn';
    if (/tuba/.test(name))      return 'tuba';
    if (/drum|percussion/.test(name)) return 'drum';
    if (/guitar/.test(name))    return 'guitar';
    if (/harp/.test(name))      return 'harp';
    if (/piano/.test(name))     return 'piano';
    // GM program fallback
    if (program >= 0 && program <= 7)   return 'piano';
    if (program >= 24 && program <= 31) return 'guitar';
    if (program === 40)                 return 'violin';
    if (program === 41)                 return 'viola';
    if (program === 42)                 return 'cello';
    if (program === 43)                 return 'contrabass';
    if (program === 46)                 return 'harp';
    if (program === 56)                 return 'trumpet';
    if (program === 57)                 return 'trombone';
    if (program === 58)                 return 'tuba';
    if (program === 60)                 return 'horn';
    if (program === 68)                 return 'oboe';
    if (program === 71)                 return 'clarinet';
    if (program === 73 || program === 72) return 'flute';
    if (program >= 52 && program <= 54) return 'vocal-1';
    if (program >= 80 && program <= 95) return 'vocal-2'; // synth pads → choir
    return 'piano'; // ultimate fallback
  }

  // ============ Stage positions (normalized to stage box) ============
  // Multi-row orchestra layout, conductor at center back, performers fanning out
  const POSITIONS = [
    // row 0 — front row (closest to viewer): vocals + soloists — on stage floor
    { x: 0.30, y: 0.87 }, { x: 0.40, y: 0.87 }, { x: 0.50, y: 0.87 },
    { x: 0.60, y: 0.87 }, { x: 0.70, y: 0.87 },
    // row 1 — strings
    { x: 0.25, y: 0.78 }, { x: 0.35, y: 0.78 }, { x: 0.45, y: 0.78 },
    { x: 0.55, y: 0.78 }, { x: 0.65, y: 0.78 }, { x: 0.75, y: 0.78 },
    // row 2 — winds
    { x: 0.30, y: 0.69 }, { x: 0.40, y: 0.69 }, { x: 0.50, y: 0.69 },
    { x: 0.60, y: 0.69 }, { x: 0.70, y: 0.69 },
    // row 3 — brass & percussion (back of orchestra tier)
    { x: 0.35, y: 0.62 }, { x: 0.50, y: 0.62 }, { x: 0.65, y: 0.62 },
  ];

  // ============ Dance troupe (back tier) ============
  const DANCE_STYLES = ['kpop', 'hiphop', 'jazz', 'ballet', 'cheer', 'waacking'];
  // 6 positions back tier (y ~38-48% — clearly behind orchestra; staggered for depth)
  const DANCE_POSITIONS = [
    { x: 0.18, y: 0.50 },
    { x: 0.31, y: 0.46 },
    { x: 0.44, y: 0.43 },
    { x: 0.56, y: 0.43 },
    { x: 0.69, y: 0.46 },
    { x: 0.82, y: 0.50 },
  ];

  function spawnDanceTroupe(cycleSec) {
    danceCycleSec = cycleSec;
    pitchSmooth = 0.5;
    glowSmooth = 0;
    const wrap = document.getElementById('dance-troupe');
    wrap.innerHTML = '';
    document.documentElement.style.setProperty('--dance-cycle', `${cycleSec.toFixed(3)}s`);
    // Randomize style assignments (visual variety) but keep positional index = pitch-band index
    // (dancer i at DANCE_POSITIONS[i] is responsible for pitchBandLabels[i] — low band → left)
    const styles = DANCE_STYLES.slice().sort(() => Math.random() - 0.5);
    const N = DANCE_POSITIONS.length;
    styles.forEach((style, i) => {
      const num = 1 + Math.floor(Math.random() * 6);
      const slug = `${style}-${num}`;
      const pos = DANCE_POSITIONS[i];
      const el = document.createElement('div');
      el.className = 'dancer';
      el.style.left = `${pos.x * 100}%`;
      el.style.top  = `${pos.y * 100}%`;
      el.style.backgroundImage = `url('dance/${style}/${slug}.png')`;
      el.dataset.slug = slug;
      el.dataset.idx = String(i);
      // Wave stagger: each dancer is 1/N cycle behind the previous → 옆으로 흐르는 wave
      el.style.animationDelay = `${(-(i / N) * cycleSec).toFixed(3)}s`;
      // Pitch-band label
      if (pitchBandLabels && pitchBandLabels[i]) {
        const b = pitchBandLabels[i];
        const lab = document.createElement('span');
        lab.className = 'dancer-band-label';
        lab.textContent = `${midiToName(b.low)}~${midiToName(b.high)}`;
        el.appendChild(lab);
      }
      wrap.appendChild(el);
      requestAnimationFrame(() => {
        el.classList.add('spawned');
        el.classList.add('dancing');
      });
    });
  }

  function updateDancersPitch(t) {
    const p = lookupPitch(t);
    if (!p) return;
    // Exponential smoothing prevents jitter; reacts within ~150ms
    pitchSmooth += (p.normPitch - pitchSmooth) * 0.18;
    glowSmooth  += (p.velocity  - glowSmooth ) * 0.22;
    const dancers = document.querySelectorAll('.dancer');
    const N = dancers.length || 1;
    const omega = (Math.PI * 2) / danceCycleSec;
    // Lift range: ±40px from pitch + ±8px gentle per-dancer wave bob
    dancers.forEach(d => {
      const i = parseInt(d.dataset.idx || '0', 10);
      const phase = i * (Math.PI * 2 / N);
      const wave = Math.sin(omega * t + phase) * 8;
      const pitchLift = (pitchSmooth - 0.5) * 30;   // -15 ~ +15 px (subtle bob)
      // Onset-driven jump: this dancer's band fires → big upward burst
      const jumpFactor = lookupJumpFactor(t, i);   // 0~1
      const jumpPx = jumpFactor * 70;              // up to 70px peak
      d.style.setProperty('--pitch-lift', `${(pitchLift + wave).toFixed(1)}px`);
      d.style.setProperty('--jump', `${jumpPx.toFixed(1)}px`);
      d.style.setProperty('--pitch-glow', Math.max(glowSmooth, jumpFactor).toFixed(2));
      d.style.setProperty('--pitch-hue', (pitchSmooth * 40 - 20).toFixed(1));
    });
  }

  function freezeDanceTroupe() {
    document.querySelectorAll('.dancer').forEach(d => d.classList.remove('dancing'));
  }
  function resumeDanceTroupe() {
    document.querySelectorAll('.dancer').forEach(d => d.classList.add('dancing'));
  }

  // ============ MIDI analysis + analysis panel ============
  const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
  function midiToName(m) {
    return `${NOTE_NAMES[m % 12]}${Math.floor(m / 12) - 1}`;
  }

  function precomputePitchTimeline(midiObj) {
    const total = midiObj.duration;
    const frames = Math.max(1, Math.ceil(total / PITCH_DT));
    const sumPitchVel = new Float32Array(frames);
    const sumVel = new Float32Array(frames);
    const allNotes = midiObj.tracks.flatMap(t => t.notes || []);
    if (allNotes.length === 0) { pitchTimeline = null; return; }
    const allPitches = allNotes.map(n => n.midi);
    const minP = Math.min(...allPitches);
    const maxP = Math.max(...allPitches);
    const range = Math.max(1, maxP - minP);
    for (const n of allNotes) {
      const startIdx = Math.max(0, Math.floor(n.time / PITCH_DT));
      const endIdx   = Math.min(frames - 1, Math.ceil((n.time + n.duration) / PITCH_DT));
      const v = n.velocity || 0.5;
      for (let i = startIdx; i <= endIdx; i++) {
        sumPitchVel[i] += n.midi * v;
        sumVel[i] += v;
      }
    }
    const out = new Array(frames);
    for (let i = 0; i < frames; i++) {
      if (sumVel[i] > 0) {
        const avg = sumPitchVel[i] / sumVel[i];
        out[i] = {
          normPitch: (avg - minP) / range,         // 0~1
          velocity: Math.min(1, sumVel[i] / 4),    // intensity proxy
        };
      } else {
        out[i] = { normPitch: 0.5, velocity: 0 };
      }
    }
    pitchTimeline = out;
  }

  function precomputePitchBands(midiObj, N = 6) {
    const allNotes = midiObj.tracks.flatMap(t => t.notes || []);
    if (allNotes.length === 0) { pitchBandsOnsets = null; pitchBandLabels = null; return; }
    const pitches = allNotes.map(n => n.midi);
    const minP = Math.min(...pitches);
    const maxP = Math.max(...pitches);
    const step = Math.max(1, (maxP - minP) / N);
    pitchBandsOnsets = Array.from({length: N}, () => []);
    pitchBandLabels = Array.from({length: N}, (_, i) => ({
      low:  Math.round(minP + i * step),
      high: Math.round(minP + (i + 1) * step),
    }));
    const sortedNotes = allNotes.slice().sort((a, b) => a.time - b.time);
    for (const n of sortedNotes) {
      const band = Math.min(N - 1, Math.max(0, Math.floor((n.midi - minP) / step)));
      pitchBandsOnsets[band].push({ t: n.time, vel: n.velocity || 0.5 });
    }
    // Debounce onsets within same band (<50ms) keeping the loudest
    pitchBandsOnsets = pitchBandsOnsets.map(onsets => {
      const out = [];
      for (const o of onsets) {
        const last = out[out.length - 1];
        if (!last || o.t - last.t > 0.05) {
          out.push({ ...o });
        } else {
          last.vel = Math.max(last.vel, o.vel);
        }
      }
      return out;
    });
  }

  // Binary-search the most recent onset at or before t for a band
  function lookupJumpFactor(t, bandIdx) {
    if (!pitchBandsOnsets) return 0;
    const onsets = pitchBandsOnsets[bandIdx];
    if (!onsets || onsets.length === 0) return 0;
    let lo = 0, hi = onsets.length - 1, latest = -1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (onsets[mid].t <= t) { latest = mid; lo = mid + 1; }
      else hi = mid - 1;
    }
    if (latest === -1) return 0;
    const dt = t - onsets[latest].t;
    const WINDOW = 0.30;     // jump envelope length
    if (dt > WINDOW) return 0;
    // Fast attack (peak immediately) + linear decay
    const env = 1 - (dt / WINDOW);
    return env * onsets[latest].vel;
  }

  function lookupPitch(t) {
    if (!pitchTimeline) return null;
    const i = Math.max(0, Math.min(pitchTimeline.length - 1, Math.floor(t / PITCH_DT)));
    return pitchTimeline[i];
  }

  function analyzeMidi(midi) {
    const tempo = midi.header.tempos[0]?.bpm ?? 120;
    const keyEntry = midi.header.keySignatures && midi.header.keySignatures[0];
    const tsEntry  = midi.header.timeSignatures && midi.header.timeSignatures[0];
    const key = keyEntry ? `${keyEntry.key} ${keyEntry.scale}` : '—';
    const sig = tsEntry ? tsEntry.timeSignature.join('/') : '4/4';
    const allNotes = midi.tracks.flatMap(t => t.notes || []);
    const pitches = allNotes.map(n => n.midi);
    const trackInstruments = midi.tracks
      .filter(t => t.notes && t.notes.length > 0)
      .map(t => t.instrument?.name || `prog ${t.instrument?.number ?? 0}`)
      .slice(0, 4);
    return {
      bpm: Math.round(tempo),
      key,
      timeSig: sig,
      duration: midi.duration,
      noteCount: allNotes.length,
      trackCount: midi.tracks.filter(t => (t.notes || []).length > 0).length,
      pitchRange: pitches.length ? `${midiToName(Math.min(...pitches))}~${midiToName(Math.max(...pitches))}` : '—',
      topInstruments: trackInstruments,
      beatSec: 60 / tempo,
      cycleSec: 4 * (60 / tempo),   // 4-frame dance cycle = 4 beats
    };
  }

  function renderAnalysisPanel(info) {
    const items = [
      ['TEMPO', `${info.bpm} BPM`],
      ['KEY',   info.key],
      ['METER', info.timeSig],
      ['LENGTH', fmtTime(info.duration)],
      ['TRACKS', `${info.trackCount}`],
      ['NOTES', `${info.noteCount}`],
      ['RANGE', info.pitchRange],
      ['DANCE CYCLE', `${info.cycleSec.toFixed(2)}s (4 beats)`],
    ];
    const panel = document.getElementById('analysis-panel');
    panel.innerHTML = items.map(([l, v], i) => `
      <div class="analysis-item"><span class="label">${l}</span><span class="value">${v}</span></div>
      ${i < items.length - 1 ? '<div class="analysis-sep"></div>' : ''}
    `).join('');
    panel.classList.remove('hidden');
  }

  async function previewAnalysis(url) {
    try {
      const buf = await fetch(url).then(r => r.arrayBuffer());
      const m = new Midi(buf);
      const info = analyzeMidi(m);
      renderAnalysisPanel(info);
      return info;
    } catch (e) {
      console.warn('previewAnalysis failed:', e);
      return null;
    }
  }

  // ============ Globals ============
  const orchestraEl = document.getElementById('orchestra');
  const playBtn     = document.getElementById('play-btn');
  const stopBtn     = document.getElementById('stop-btn');
  const stageEl     = document.getElementById('stage');
  const hintEl      = document.getElementById('stage-hint');
  const midiSelect  = document.getElementById('midi-select');
  const timeDisplay = document.getElementById('time-display');
  const progressFill= document.getElementById('progress-fill');
  const activeBar   = document.getElementById('active-instruments');
  const stageTabs   = document.getElementById('stage-tabs');

  let midi = null;
  let synths = [];
  let scheduledIds = [];
  let updateRafId = null;
  let characterIntervals = {};   // { slug: [{start,end}, ...] }
  let characterEntries = {};     // { slug: {el, position, firstTime} }
  let entrySequence = [];        // ordered slugs by first appearance
  let nextPosIdx = 0;
  let playStartedAt = 0;         // Tone.now() at playback start
  let totalDuration = 0;
  let isPlaying = false;
  let danceCycleSec = 1.6;       // updated per song
  // Pitch timeline (precomputed per song) — index = floor(t/PITCH_DT)
  const PITCH_DT = 0.05;
  let pitchTimeline = null;      // Array<{normPitch, velocity}>
  let pitchSmooth = 0.5;         // exponentially smoothed pitch (avoids jitter)
  let glowSmooth = 0;
  // Pitch-band split — 6 bands by song's actual pitch range, each band → 1 dancer
  let pitchBandsOnsets = null;   // Array<Array<{t, vel}>>  (length 6)
  let pitchBandLabels = null;    // Array<{low, high}> midi numbers

  // ============ Stage tabs ============
  stageTabs.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    [...stageTabs.querySelectorAll('button')].forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    stageEl.style.backgroundImage = `url('stages/${btn.dataset.stage}.png')`;
  });

  // ============ Format helpers ============
  function fmtTime(sec) {
    if (!Number.isFinite(sec) || sec < 0) sec = 0;
    const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
    return `${m}:${s.toString().padStart(2,'0')}`;
  }

  // ============ Parse MIDI → instrument intervals ============
  async function loadMidi(url) {
    const buf = await fetch(url).then(r => r.arrayBuffer());
    midi = new Midi(buf);
    totalDuration = midi.duration;
    characterIntervals = {};
    midi.tracks.forEach(track => {
      if (!track.notes || track.notes.length === 0) return;
      const isDrum = track.channel === 9 || /drum|percussion/i.test(track.name);
      const slug = isDrum ? 'drum' : programToSlug(track.instrument?.number ?? 0, track.name);
      if (!characterIntervals[slug]) characterIntervals[slug] = [];
      track.notes.forEach(n => {
        characterIntervals[slug].push({
          start: n.time,
          end:   n.time + Math.max(n.duration, 0.05),
        });
      });
    });
    // Sort intervals + extend each note's end by SUSTAIN_GRACE so the play animation
    // stays smooth across short gaps; then merge overlapping intervals.
    // 3s grace: animation only pauses after 3s of true silence on this instrument.
    const SUSTAIN_GRACE = 3.0;   // seconds — keep "playing" pose this long after a note ends
    const MERGE_GAP    = 3.5;    // seconds — bridge gaps shorter than this (phrase continuity)
    for (const slug of Object.keys(characterIntervals)) {
      const arr = characterIntervals[slug]
        .map(iv => ({ start: iv.start, end: iv.end + SUSTAIN_GRACE }))
        .sort((a,b) => a.start - b.start);
      const merged = [];
      for (const iv of arr) {
        const last = merged[merged.length-1];
        if (last && iv.start - last.end < MERGE_GAP) {
          last.end = Math.max(last.end, iv.end);
        } else {
          merged.push({ ...iv });
        }
      }
      characterIntervals[slug] = merged;
    }
    // Entry order by first note time
    entrySequence = Object.entries(characterIntervals)
      .map(([slug, ivs]) => ({ slug, firstTime: ivs[0].start }))
      .sort((a,b) => a.firstTime - b.firstTime);
  }

  // ============ Spawn / update characters ============
  function spawnCharacter(slug) {
    if (characterEntries[slug]) return;
    const pos = POSITIONS[nextPosIdx % POSITIONS.length];
    nextPosIdx++;
    const el = document.createElement('div');
    el.className = 'character';   // play animation always loaded, paused until playing
    el.style.left = `${pos.x * 100}%`;
    el.style.top  = `${pos.y * 100}%`;
    el.style.backgroundImage = `url('sprites/${slug}/play.png')`;   // single sheet only
    el.dataset.slug = slug;
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = slug;
    el.appendChild(label);
    orchestraEl.appendChild(el);
    requestAnimationFrame(() => el.classList.add('spawned'));
    characterEntries[slug] = { el, position: pos, mode: 'resting' };
    renderActiveBar();
  }

  function setCharacterMode(slug, mode /* 'playing' | 'resting' */) {
    const entry = characterEntries[slug];
    if (!entry || entry.mode === mode) return;
    entry.mode = mode;
    // Only toggle the 'playing' class — animation-play-state switches running/paused,
    // preserving the current frame position when paused.
    entry.el.classList.toggle('playing', mode === 'playing');
  }

  function isActiveAt(slug, t) {
    const ivs = characterIntervals[slug];
    if (!ivs) return false;
    // Binary search would be faster but linear is fine for ~hundreds of notes
    for (const iv of ivs) {
      if (iv.start > t) return false;
      if (t >= iv.start && t <= iv.end) return true;
    }
    return false;
  }

  function renderActiveBar() {
    activeBar.innerHTML = '';
    for (const { slug } of entrySequence) {
      if (!characterEntries[slug]) continue;
      const tag = document.createElement('div');
      tag.className = 'active-tag' + (characterEntries[slug].mode === 'playing' ? ' active' : '');
      tag.textContent = slug;
      tag.dataset.slug = slug;
      activeBar.appendChild(tag);
    }
  }

  function updateActiveBarMode() {
    [...activeBar.children].forEach(tag => {
      const slug = tag.dataset.slug;
      const isPlaying = characterEntries[slug]?.mode === 'playing';
      tag.classList.toggle('active', isPlaying);
    });
  }

  // ============ Playback loop ============
  function tick() {
    if (!isPlaying) return;
    const t = Tone.now() - playStartedAt;
    if (t >= totalDuration) { stopPlayback(); return; }
    // Spawn newly arriving characters
    for (const { slug, firstTime } of entrySequence) {
      if (firstTime <= t && !characterEntries[slug]) spawnCharacter(slug);
    }
    // Toggle play animation: running while active interval, paused at current frame otherwise
    for (const slug of Object.keys(characterEntries)) {
      setCharacterMode(slug, isActiveAt(slug, t) ? 'playing' : 'resting');
    }
    // Back tier — real-time pitch reactive dancers
    updateDancersPitch(t);
    updateActiveBarMode();
    // Progress + time
    progressFill.style.width = `${(t / totalDuration) * 100}%`;
    timeDisplay.textContent = `${fmtTime(t)} / ${fmtTime(totalDuration)}`;
    updateRafId = requestAnimationFrame(tick);
  }

  // ============ Synthesis (Tone.js PolySynth per character) ============
  function createSynths() {
    // 1 polysynth per used character — cleaner separation
    const usedSlugs = Object.keys(characterIntervals);
    synths = [];
    const synthByChar = {};
    for (const slug of usedSlugs) {
      const s = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: slug === 'drum' ? 'square' : (slug.startsWith('vocal') ? 'sine' : 'triangle') },
        envelope: { attack: 0.02, decay: 0.1, sustain: 0.4, release: 0.5 },
        volume: -10,
      }).toDestination();
      synths.push(s);
      synthByChar[slug] = s;
    }
    return synthByChar;
  }

  function scheduleNotes(synthByChar) {
    scheduledIds = [];
    midi.tracks.forEach(track => {
      if (!track.notes || track.notes.length === 0) return;
      const isDrum = track.channel === 9 || /drum|percussion/i.test(track.name);
      const slug = isDrum ? 'drum' : programToSlug(track.instrument?.number ?? 0, track.name);
      const synth = synthByChar[slug];
      if (!synth) return;
      track.notes.forEach(n => {
        const id = Tone.Transport.schedule(time => {
          try {
            synth.triggerAttackRelease(n.name, Math.max(n.duration, 0.05), time, n.velocity);
          } catch (e) { /* swallow occasional Tone clipping errors */ }
        }, n.time);
        scheduledIds.push(id);
      });
    });
  }

  // ============ Play / Stop controls ============
  function hardResetTransport() {
    // 1) stop transport so no more events fire
    try { Tone.Transport.stop(); } catch(e) {}
    try { Tone.Transport.cancel(0); } catch(e) {}
    Tone.Transport.position = 0;
    // 2) defer dispose so any in-flight scheduled callbacks finish first
    const toDispose = synths.slice();
    synths = [];
    scheduledIds = [];
    setTimeout(() => {
      toDispose.forEach(s => { try { s.releaseAll && s.releaseAll(); s.dispose(); } catch(e) {} });
    }, 150);
  }

  async function startPlayback() {
    playBtn.disabled = true;
    midiSelect.disabled = true;
    try {
      // Hard reset prior state, stop the rAF loop
      hardResetTransport();
      if (updateRafId) { cancelAnimationFrame(updateRafId); updateRafId = null; }
      isPlaying = false;
      // Ensure audio context is unsuspended (chrome may auto-suspend on idle)
      await Tone.start();
      try { await Tone.context.resume(); } catch(e) {}
      // Brief wait so deferred dispose from previous stop completes before we build new synths
      await new Promise(r => setTimeout(r, 200));
      await loadMidi(midiSelect.value);
      orchestraEl.innerHTML = '';
      activeBar.innerHTML = '';
      characterEntries = {};
      nextPosIdx = 0;
      hintEl.classList.add('hidden');
      progressFill.style.width = '0%';
      // Back tier — autonomous dance troupe synced to song BPM (1/N wave stagger)
      const info = analyzeMidi(midi);
      renderAnalysisPanel(info);
      precomputePitchTimeline(midi);
      precomputePitchBands(midi, 6);
      spawnDanceTroupe(info.cycleSec);
      // Build synths + schedule (fresh)
      const synthByChar = createSynths();
      scheduleNotes(synthByChar);
      const LEAD_IN = 0.15;             // 150 ms lead-in covers cold-start latency
      Tone.Transport.start(`+${LEAD_IN}`);
      playStartedAt = Tone.now() + LEAD_IN;
      isPlaying = true;
      stopBtn.disabled = false;
      tick();
    } catch (err) {
      console.error(err);
      alert(`Playback error: ${err.message}`);
      hardResetTransport();
      playBtn.disabled = false;
      midiSelect.disabled = false;
    }
  }

  function stopPlayback() {
    isPlaying = false;
    if (updateRafId) cancelAnimationFrame(updateRafId);
    updateRafId = null;
    hardResetTransport();
    playBtn.disabled = false;
    stopBtn.disabled = true;
    midiSelect.disabled = false;
    // Keep characters on stage (user requirement: never remove); just freeze animation
    Object.keys(characterEntries).forEach(slug => setCharacterMode(slug, 'resting'));
    updateActiveBarMode();
    freezeDanceTroupe();   // also freeze back tier dancers at their current frame
    timeDisplay.textContent = `${fmtTime(0)} / ${fmtTime(totalDuration)}`;
    progressFill.style.width = '0%';
  }

  playBtn.addEventListener('click', startPlayback);
  stopBtn.addEventListener('click', stopPlayback);

  // Reset orchestra when picking a different piece (before playing)
  midiSelect.addEventListener('change', () => {
    if (isPlaying) return;
    orchestraEl.innerHTML = '';
    activeBar.innerHTML = '';
    characterEntries = {};
    nextPosIdx = 0;
    hintEl.classList.remove('hidden');
    timeDisplay.textContent = '0:00 / 0:00';
    progressFill.style.width = '0%';
    // Pre-analysis preview (load song meta without playback)
    previewAnalysis(midiSelect.value);
  });

  // Initial preview on page load
  previewAnalysis(midiSelect.value);
</script>

</body>
